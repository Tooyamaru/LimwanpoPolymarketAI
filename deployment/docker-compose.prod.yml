version: "3.9"

# Production overrides — use with:
#   docker-compose -f docker-compose.yml -f deployment/docker-compose.prod.yml up -d

services:

  postgres:
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    volumes: []
    environment:
      APP_ENV: production
      DEBUG: "false"
      LOG_FORMAT: json
